app = "recipe-manager-mahimadangi"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 7860
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "recipe_data"
  destination = "/app/data"

[env]
  DATABASE_URL = "sqlite+aiosqlite:////app/data/recipes.db"
  UPLOAD_DIR = "/app/data/uploads"
  CORS_ORIGINS = "*"
  PORT = "7860"
  SECRET_KEY = "fly-io-production-secret-key-change-me"
  COOKIE_SECURE = "True"
  COOKIE_SAMESITE = "lax"
