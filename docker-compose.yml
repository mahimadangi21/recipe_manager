version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/recipes.db:/app/recipes.db
    env_file:
      - ./backend/.env.example
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./recipes.db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
